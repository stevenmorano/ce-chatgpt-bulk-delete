<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steve's Tools: ChatGPT Bulk Delete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <!-- Top Header -->
  <header class="top-header">
    <div class="header-left">
      <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="24" width="24" xmlns="http://www.w3.org/2000/svg" style="color: #10a37f;"><path d="M21.928 11.607c-.202-.488-.635-.605-.928-.633V8c0-1.103-.897-2-2-2h-6V4.61c.305-.274.5-.668.5-1.11a1.5 1.5 0 0 0-3 0c0 .442.195.836.5 1.11V6H5c-1.103 0-2 .897-2 2v2.997l-.082.006A1 1 0 0 0 1.99 12l.01 5.804c0 .896.797 1.625 1.768 1.682l.232.013V20c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-.5c1.103 0 2-.897 2-2V12c0-.142-.027-.278-.072-.403zM7 16H5v-2h2v2zm0-4H5v-2h2v2zm12 4h-2v-2h2v2zm0-4h-2v-2h2v2z"></path></svg>
      <h1>Steve's Tools: ChatGPT Bulk Delete</h1>
    </div>
    <div class="header-right" style="display: flex; align-items: center; gap: 10px;">
      <span id="sync-status" class="sync-status">Last synced: Never</span>
      <input type="number" id="sync-limit-input" placeholder="Max to sync (blank = all)" style="width: 180px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary);" />
      <button id="clear-db-btn" class="btn btn-ghost" style="color: var(--danger-primary);">Clear Data</button>
      <button id="sync-btn" class="btn btn-secondary">Sync Now</button>
    </div>
  </header>

  <!-- Controls Bar -->
  <div class="controls-bar">
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search across all conversations..." />
    </div>
    <div class="filters-container">
      <label class="toggle-label" style="display: flex; align-items: center; gap: 6px; color: var(--text-secondary); margin-right: 15px; font-weight: 500; cursor: pointer;">
        <input type="checkbox" id="hide-projects-toggle" checked style="cursor: pointer;" />
        Hide Folders & Projects
      </label>
      <input type="date" id="date-from" placeholder="From" />
      <input type="date" id="date-to" placeholder="To" />
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <table class="chat-table">
      <thead>
        <tr>
          <th width="40"><input type="checkbox" id="select-all-checkbox" /></th>
          <th class="sortable" data-sort="title">Conversation Title <span class="sort-icon"></span></th>
          <th width="140" class="sortable" data-sort="location">Location <span class="sort-icon"></span></th>
          <th width="150" class="sortable" data-sort="created">Created At <span class="sort-icon"></span></th>
          <th width="150" class="sortable" data-sort="updated">Last Updated <span class="sort-icon">▼</span></th>
          <th width="80">Actions</th>
        </tr>
      </thead>
      <tbody id="chat-list-body">
        <!-- Rows will be injected here via JS -->
      </tbody>
    </table>
  </main>

  <!-- Floating Action Banner -->
  <div id="action-banner" class="action-banner hidden">
    <span id="selected-count-text">0 conversations selected</span>
    <div class="action-buttons">
      <button id="deselect-btn" class="btn btn-ghost">Deselect All</button>
      <button id="delete-selected-btn" class="btn btn-danger">Delete Selected</button>
    </div>
  </div>

  <!-- Progress Overlay Modal -->
  <div id="progress-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h2 id="modal-title">Deleting Conversations...</h2>
      <p id="modal-desc">Please do not close this tab.</p>
      <div class="progress-bar-container">
        <div id="progress-bar-fill" class="progress-bar-fill"></div>
      </div>
      <p id="modal-status" class="modal-status">0 / 0</p>
      <div id="modal-actions" class="modal-actions hidden">
        <button id="modal-cancel-btn" class="btn btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="db.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
